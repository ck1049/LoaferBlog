spring:
  profiles:
    active: test
  datasource:
    url: jdbc:postgresql://localhost:5432/loafer_blog
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 2048MB  # 单个文件最大大小
      max-request-size: 2048MB  # 整个请求最大大小
      file-size-threshold: 20MB  # 文件超过该大小会写入磁盘（否则在内存）

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.loafer.blog.model.entity
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

server:
  port: 8080
  # 静态资源配置
  servlet:
    context-path: /loafer-blog

jwt:
  secret: loafer_blog_high_strength_jwt_secret_key
  expiration: 86400

# 文件上传配置
file:
  upload:
    dir: /uploads
    avatar-dir: /uploads/avatars
  access:
    prefix: /uploads
    domain: http://localhost:8080/loafer-blog
  rsa:
    business:
      private-key-path: /rsa/business/private.key
      public-key-path: /rsa/business/public.key
    communication:
      private-key-path: /rsa/communication/private.key
      public-key-path: /rsa/communication/public.key