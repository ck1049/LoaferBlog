spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/loafer_blog
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.loafer.blog.model.entity
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true

server:
  port: 8080
  # 静态资源配置
  servlet:
    context-path: /
  resources:
    static-locations: classpath:/static/,file:./uploads/

jwt:
  secret: loafer_blog_high_strength_jwt_secret_key
  expiration: 86400