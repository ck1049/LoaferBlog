spring:
  profiles:
    active: dev
  datasource:
    url: jdbc:postgresql://localhost:5432/loafer_blog
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.loafer.blog.model.entity
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

server:
  port: 8080
  # 静态资源配置
  servlet:
    context-path: /

jwt:
  secret: loafer_blog_high_strength_jwt_secret_key
  expiration: 86400

# 文件上传配置
file:
  upload:
    dir: /uploads
    avatar-dir: /uploads/avatars
  access:
    prefix: /uploads
    domain: http://localhost:8080